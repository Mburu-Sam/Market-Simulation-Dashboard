<!DOCTYPE html>
<html>
<head>
    <title>Market Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-6xl mx-auto py-10">

    <h1 class="text-3xl font-bold text-center mb-6">Market Simulation Dashboard</h1>

    <!-- Control Panel -->
    <div class="bg-white p-6 rounded-xl shadow mb-6">
        <form method="post" class="grid grid-cols-3 gap-4">
            {% csrf_token %}

            <div>
                <label class="block mb-1">Buyers</label>
                <input type="number" name="buyers" value="50" class="w-full border p-2 rounded">
            </div>

            <div>
                <label class="block mb-1">Sellers</label>
                <input type="number" name="sellers" value="5" class="w-full border p-2 rounded">
            </div>

            <div class="flex items-end">
                <button class="bg-blue-600 text-white px-4 py-2 rounded w-full">Run</button>
            </div>
        </form>
    </div>

    <!-- KPI Cards -->
    <div class="grid grid-cols-3 gap-4 mb-6">
        <div class="bg-white p-4 rounded-xl shadow text-center">
            <h3 class="text-gray-500">Avg Price</h3>
            <p class="text-2xl font-bold" id="avgPrice"></p>
        </div>

        <div class="bg-white p-4 rounded-xl shadow text-center">
            <h3 class="text-gray-500">Total Demand</h3>
            <p class="text-2xl font-bold" id="totalDemand"></p>
        </div>

        <div class="bg-white p-4 rounded-xl shadow text-center">
            <h3 class="text-gray-500">Total Sales</h3>
            <p class="text-2xl font-bold" id="totalSales"></p>
        </div>
    </div>

    <!-- Charts -->
    <div class="grid grid-cols-2 gap-6">

        <div class="bg-white p-4 rounded-xl shadow">
            <h3 class="mb-2">Price Trend</h3>
            <canvas id="priceChart"></canvas>
        </div>

        <div class="bg-white p-4 rounded-xl shadow">
            <h3 class="mb-2">Demand</h3>
            <canvas id="demandChart"></canvas>
        </div>

        <div class="bg-white p-4 rounded-xl shadow col-span-2">
            <h3 class="mb-2">Sales</h3>
            <canvas id="salesChart"></canvas>
        </div>

    </div>

    <!-- Export Button -->
    <div class="mt-6 text-right">
        <a href="/export/" class="bg-green-600 text-white px-4 py-2 rounded">Download Excel</a>
    </div>

</div>

<script>
    const data = {{ data|safe }};

    // KPI calculations
    document.getElementById("avgPrice").innerText =
        (data.prices.reduce((a,b)=>a+b,0)/data.prices.length).toFixed(2);

    document.getElementById("totalDemand").innerText =
        data.demand.reduce((a,b)=>a+b,0);

    document.getElementById("totalSales").innerText =
        data.sales.reduce((a,b)=>a+b,0);

    // Charts
    new Chart(document.getElementById('priceChart'), {
        type: 'line',
        data: {
            labels: data.prices.map((_, i) => i),
            datasets: [{ label: 'Price', data: data.prices }]
        }
    });

    new Chart(document.getElementById('demandChart'), {
        type: 'line',
        data: {
            labels: data.demand.map((_, i) => i),
            datasets: [{ label: 'Demand', data: data.demand }]
        }
    });

    new Chart(document.getElementById('salesChart'), {
        type: 'line',
        data: {
            labels: data.sales.map((_, i) => i),
            datasets: [{ label: 'Sales', data: data.sales }]
        }
    });
</script>

</body>
</html>
