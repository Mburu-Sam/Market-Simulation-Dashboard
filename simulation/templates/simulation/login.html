<!DOCTYPE html>
<html>
<head>
    <title>Login - Market Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full">
        <h1 class="text-2xl font-bold text-center mb-6">Login</h1>
        
        {% if error %}
            <div class="bg-red-100 text-red-700 p-4 rounded mb-4">{{ error }}</div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-2">Username</label>
                <input type="text" name="username" required class="w-full border border-gray-300 p-2 rounded">
            </div>
            
            <div class="mb-6">
                <label class="block text-sm font-semibold mb-2">Password</label>
                <input type="password" name="password" required class="w-full border border-gray-300 p-2 rounded">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-semibold hover:bg-blue-700">
                Login
            </button>
        </form>
        
        <p class="text-center mt-4">
            Don't have an account? <a href="{% url 'register' %}" class="text-blue-600 hover:underline">Register</a>
        </p>
    </div>
</body>
</html>
